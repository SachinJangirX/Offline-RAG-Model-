<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline RAG Assistant</title>

    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app">
        <header class="topbar">
            <div class="logo">Offline RAG Assistant</div>
            <div class="badge">Local Mode</div>
        </header>

        <div class="main">
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>Upload Documents</h3>
                    <input type="file" id="fileInput" multiple />
                    <button class="primary-btn" onclick="uploadFile()">Upload PDF</button>
                </div>  

                <div class="sidebar-section">
                    <h3>Delete Document</h3>
                    <input type="text" id="deleteFileName" placeholder="Exact file name" />
                    <button id="deleteBtn" class="danger-btn">Delete</button>
                </div>
            </aside>    

            <section class="chat-section">
                <div id="chat" class="chat-box"></div>

                <div class="input-area">
                    <input type="text" id="question" placeholder="Ask your question ...." />
                    <button onclick="sendQuestion()">Send</button>
                </div>
            </section>
        </div>
    </div>
<script src="/static/script.js"></script>
    
</body>
</html>
